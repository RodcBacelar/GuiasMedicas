services:
  banco_dados:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: userDB
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: guias_medicas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: guias_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://userDB:${POSTGRES_PASSWORD}@banco_dados:5432/guias_medicas
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - banco_dados

volumes:
  pgdata: