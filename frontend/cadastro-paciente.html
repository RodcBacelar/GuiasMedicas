<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Paciente – Guias Médicas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>🏥 Guias Médicas</h1>
        <p>Cadastro de Paciente</p>
      </div>

      <div id="erro"    class="alert alert-error"></div>
      <div id="sucesso" class="alert alert-success"></div>

      <form id="form-cadastro">
        <div class="form-group">
          <label>Nome completo *</label>
          <input type="text" id="nome" required>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="telefone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
          <label>E-mail *</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Senha *</label>
          <input type="password" id="senha" required minlength="6">
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Data de nascimento *</label>
            <input type="date" id="nascimento" required>
          </div>
          <div class="form-group">
            <label>Sexo *</label>
            <select id="sexo" required>
              <option value="">Selecione</option>
              <option value="masculino">Masculino</option>
              <option value="feminino">Feminino</option>
              <option value="outro">Outro</option>
            </select>
          </div>
        </div>
        <div class="form-group mt-4">
          <button type="submit" class="btn btn-primary" id="btn">Cadastrar</button>
        </div>
        <p class="text-center text-muted mt-2">
          Já tem conta? <a href="index.html">Fazer login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Cadastrando...';

      try {
        await apiFetch('/pacientes', {
          method: 'POST',
          body: JSON.stringify({
            nome:       document.getElementById('nome').value,
            telefone:   document.getElementById('telefone').value || null,
            email:      document.getElementById('email').value,
            senha:      document.getElementById('senha').value,
            tipo:       'paciente',
            nascimento: document.getElementById('nascimento').value,
            sexo:       document.getElementById('sexo').value,
          }),
        });
        mostrarSucesso('sucesso', 'Paciente cadastrado com sucesso! Redirecionando para o login...');
        setTimeout(() => window.location.href = 'index.html', 2000);
      } catch (err) {
        mostrarErro('erro', err.message);
        btn.disabled = false;
        btn.textContent = 'Cadastrar';
      }
    });
  </script>
</body>
</html>
