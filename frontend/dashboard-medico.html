<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Médico – Guias Médicas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">Guias Médicas</span>
    <span style="display:flex; align-items:center;">
      <span class="navbar-user" id="nome-usuario"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </span>
  </nav>

  <div class="container-lg">
    <div class="page-header">
      <h2>Guias Solicitadas</h2>
      <a href="nova-guia.html" class="btn btn-success">+ Nova Guia</a>
    </div>

    <div id="erro" class="alert alert-error"></div>

    <div class="card" style="padding:12px 20px; margin-bottom:16px; border-left-color: var(--cinza);">
      <label style="margin-bottom:0; display:flex; align-items:center; gap:12px; text-transform:none; font-size:.88rem; font-weight:500;">
        <span style="color:var(--cinza); text-transform:uppercase; font-size:.72rem; letter-spacing:.5px; font-weight:700;">Filtrar</span>
        <select id="filtro-status" style="width:auto;">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="em_analise">Em Análise</option>
          <option value="aprovado">Aprovado</option>
          <option value="negado">Negado</option>
        </select>
      </label>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <div id="loading" class="loading">Carregando guias...</div>
      <div class="table-wrapper" id="tabela-wrapper" style="display:none; border:none;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Paciente</th>
              <th>Unidade</th>
              <th>CID-10</th>
              <th>Prioridade</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <p id="sem-guias" class="text-center text-muted mt-4" style="display:none; padding:24px;">Nenhuma guia encontrada.</p>
      </div>
    </div>
  </div>

  <!-- Modal de detalhes -->
  <div class="modal-overlay" id="modal-detalhes">
    <div class="modal" style="max-width:600px;">
      <div class="modal-title" id="modal-titulo-detalhes">Detalhes da Guia</div>
      <div id="detalhes-conteudo"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const usuario = exigirAuth('medico');
    let todasGuias = [];

    async function carregarGuias() {
      try {
        todasGuias = await apiFetch('/guias');
        todasGuias = todasGuias.filter(g => g.id_medico === usuario.id);
        renderTabela();
      } catch (err) {
        mostrarErro('erro', 'Erro ao carregar guias: ' + err.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tabela-wrapper').style.display = 'block';
      }
    }

    function renderTabela() {
      const filtro = document.getElementById('filtro-status').value;
      const guias  = filtro ? todasGuias.filter(g => g.status === filtro) : todasGuias;
      const tbody  = document.getElementById('tbody');
      tbody.innerHTML = '';

      if (guias.length === 0) {
        document.getElementById('sem-guias').style.display = 'block';
        return;
      }
      document.getElementById('sem-guias').style.display = 'none';

      guias.forEach(g => {
        const { text, cls } = statusLabel(g.status);
        const data = new Date(g.criado_em).toLocaleDateString('pt-BR');
        const prioLabel = ['', 'Urgente', 'Alta', 'Normal', 'Baixa', 'Eletivo'][g.prioridade] || g.prioridade;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--cinza); font-size:.8rem;">#${g.id}</td>
          <td>${g.nome_paciente || '—'}</td>
          <td>${g.nome_unidade || '—'}</td>
          <td><code>${g.cid_10}</code></td>
          <td>${prioLabel}</td>
          <td><span class="badge ${cls}">${text}</span></td>
          <td style="color:var(--cinza);">${data}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="abrirDetalhes(${g.id})">Detalhar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function abrirDetalhes(id) {
      const g = todasGuias.find(x => x.id === id);
      if (!g) return;
      const { text, cls } = statusLabel(g.status);
      const exames = g.exames?.map(e => e.nome).join(', ') || '—';
      document.getElementById('modal-titulo-detalhes').textContent = `Guia #${g.id} — ${g.nome_paciente}`;
      document.getElementById('detalhes-conteudo').innerHTML = `
        <table style="width:100%; font-size:.88rem;">
          <tr><td style="padding:7px 4px; color:var(--cinza); width:42%; font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Paciente</td><td>${g.nome_paciente}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Unidade</td><td>${g.nome_unidade}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Status</td><td><span class="badge ${cls}">${text}</span></td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">CID-10</td><td><code>${g.cid_10}</code></td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Prioridade</td><td>${g.prioridade}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Nº Consultas</td><td>${g.numero_consultas}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Tempo de doença</td><td>${g.tempo_doenca}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Quadro clínico</td><td>${g.quadro_clinico}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Hipótese diagnóstica</td><td>${g.hipotese_diagnostico}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Medicação</td><td>${g.medicacao}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Tratamento/Evolução</td><td>${g.tratamento_evolucao}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Motivo encaminhamento</td><td>${g.motivo_encaminhamento}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Exames</td><td>${exames}</td></tr>
        </table>
      `;
      document.getElementById('modal-detalhes').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('modal-detalhes').classList.remove('open');
    }

    document.getElementById('filtro-status').addEventListener('change', renderTabela);
    document.getElementById('modal-detalhes').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) fecharModal();
    });

    apiFetch(`/medicos/${usuario.id}`).then(data => {
      if (data?.[0]) document.getElementById('nome-usuario').textContent = 'Dr(a). ' + data[0].nome;
    }).catch(() => {});

    carregarGuias();
  </script>
</body>
</html>
