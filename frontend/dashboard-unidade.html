<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unidade – Guias Médicas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">Guias Médicas</span>
    <span style="display:flex; align-items:center;">
      <span class="navbar-user" id="nome-usuario"></span>
      <button class="btn-logout" onclick="carregarGuias()" style="margin-right:4px;">↻</button>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </span>
  </nav>

  <div class="container-lg">
    <div class="page-header">
      <h2>Painel de Análise</h2>
    </div>

    <!-- Stat cards -->
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px;">
      <div style="background:var(--branco); border-radius:var(--radius); box-shadow:var(--sombra); padding:20px; border-top:3px solid var(--amarelo); text-align:center;">
        <div style="font-size:2rem; font-weight:800; color:var(--amarelo); line-height:1;" id="cnt-pendente">—</div>
        <div style="font-size:.7rem; font-weight:700; color:var(--cinza); text-transform:uppercase; letter-spacing:.6px; margin-top:6px;">Pendentes</div>
      </div>
      <div style="background:var(--branco); border-radius:var(--radius); box-shadow:var(--sombra); padding:20px; border-top:3px solid var(--turquesa); text-align:center;">
        <div style="font-size:2rem; font-weight:800; color:var(--turquesa); line-height:1;" id="cnt-analise">—</div>
        <div style="font-size:.7rem; font-weight:700; color:var(--cinza); text-transform:uppercase; letter-spacing:.6px; margin-top:6px;">Em Análise</div>
      </div>
      <div style="background:var(--branco); border-radius:var(--radius); box-shadow:var(--sombra); padding:20px; border-top:3px solid var(--esmeralda); text-align:center;">
        <div style="font-size:2rem; font-weight:800; color:var(--esmeralda); line-height:1;" id="cnt-aprovado">—</div>
        <div style="font-size:.7rem; font-weight:700; color:var(--cinza); text-transform:uppercase; letter-spacing:.6px; margin-top:6px;">Aprovadas</div>
      </div>
      <div style="background:var(--branco); border-radius:var(--radius); box-shadow:var(--sombra); padding:20px; border-top:3px solid var(--vermelho); text-align:center;">
        <div style="font-size:2rem; font-weight:800; color:var(--vermelho); line-height:1;" id="cnt-negado">—</div>
        <div style="font-size:.7rem; font-weight:700; color:var(--cinza); text-transform:uppercase; letter-spacing:.6px; margin-top:6px;">Negadas</div>
      </div>
    </div>

    <div id="erro"   class="alert alert-error"></div>
    <div id="sucesso" class="alert alert-success"></div>

    <div class="card" style="padding:12px 20px; margin-bottom:16px; border-left-color:var(--cinza);">
      <label style="margin-bottom:0; display:flex; align-items:center; gap:12px; text-transform:none; font-size:.88rem; font-weight:500;">
        <span style="color:var(--cinza); text-transform:uppercase; font-size:.72rem; letter-spacing:.5px; font-weight:700;">Filtrar</span>
        <select id="filtro-status" style="width:auto;">
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="em_analise">Em Análise</option>
          <option value="aprovado">Aprovado</option>
          <option value="negado">Negado</option>
        </select>
      </label>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <div id="loading" class="loading">Carregando guias...</div>
      <div class="table-wrapper" id="tabela-wrapper" style="display:none; border:none;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Médico</th>
              <th>Paciente</th>
              <th>CID-10</th>
              <th>Prioridade</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <p id="sem-guias" class="text-center text-muted" style="display:none; padding:24px;">Nenhuma guia encontrada.</p>
      </div>
    </div>
  </div>

  <!-- Modal de análise -->
  <div class="modal-overlay" id="modal-analise">
    <div class="modal" style="max-width:620px;">
      <div class="modal-title" id="modal-titulo">Analisar Guia</div>
      <div id="modal-info" style="margin-bottom:18px; font-size:.88rem; line-height:1.8; color:var(--slate);"></div>
      <hr>
      <div class="form-group">
        <label>Alterar status</label>
        <select id="novo-status">
          <option value="pendente">Pendente</option>
          <option value="em_analise">Em Análise</option>
          <option value="aprovado">Aprovado</option>
          <option value="negado">Negado</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-success" style="width:auto;" onclick="salvarStatus()">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const usuario = exigirAuth('unidade');
    let todasGuias = [];
    let guiaSelecionadaId = null;

    async function carregarGuias() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('tabela-wrapper').style.display = 'none';
      try {
        const todas = await apiFetch('/guias');
        todasGuias = todas.filter(g => g.id_unidade === usuario.id);
        atualizarResumo();
        renderTabela();
      } catch (err) {
        mostrarErro('erro', 'Erro ao carregar guias: ' + err.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tabela-wrapper').style.display = 'block';
      }
    }

    function atualizarResumo() {
      const c = { pendente: 0, em_analise: 0, aprovado: 0, negado: 0 };
      todasGuias.forEach(g => { if (c[g.status] !== undefined) c[g.status]++; });
      document.getElementById('cnt-pendente').textContent = c.pendente;
      document.getElementById('cnt-analise').textContent  = c.em_analise;
      document.getElementById('cnt-aprovado').textContent = c.aprovado;
      document.getElementById('cnt-negado').textContent   = c.negado;
    }

    function renderTabela() {
      const filtro = document.getElementById('filtro-status').value;
      const guias  = filtro ? todasGuias.filter(g => g.status === filtro) : todasGuias;
      const tbody  = document.getElementById('tbody');
      tbody.innerHTML = '';

      if (guias.length === 0) {
        document.getElementById('sem-guias').style.display = 'block';
        return;
      }
      document.getElementById('sem-guias').style.display = 'none';

      guias.forEach(g => {
        const { text, cls } = statusLabel(g.status);
        const data = new Date(g.criado_em).toLocaleDateString('pt-BR');
        const prioLabel = ['', 'Urgente', 'Alta', 'Normal', 'Baixa', 'Eletivo'][g.prioridade] || g.prioridade;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--cinza); font-size:.8rem;">#${g.id}</td>
          <td>${g.nome_medico || '—'}</td>
          <td>${g.nome_paciente || '—'}</td>
          <td><code>${g.cid_10}</code></td>
          <td>${prioLabel}</td>
          <td><span class="badge ${cls}">${text}</span></td>
          <td style="color:var(--cinza);">${data}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="abrirAnalise(${g.id})">Analisar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function abrirAnalise(id) {
      const g = todasGuias.find(x => x.id === id);
      if (!g) return;
      guiaSelecionadaId = id;
      const exames = g.exames?.map(e => e.nome).join(', ') || '—';
      document.getElementById('modal-titulo').textContent = `Guia #${g.id} — ${g.nome_paciente}`;
      document.getElementById('modal-info').innerHTML = `
        <b>Médico:</b> ${g.nome_medico}<br>
        <b>CID-10:</b> <code>${g.cid_10}</code><br>
        <b>Prioridade:</b> ${g.prioridade}<br>
        <b>Quadro clínico:</b> ${g.quadro_clinico}<br>
        <b>Hipótese diagnóstica:</b> ${g.hipotese_diagnostico}<br>
        <b>Medicação:</b> ${g.medicacao}<br>
        <b>Motivo encaminhamento:</b> ${g.motivo_encaminhamento}<br>
        <b>Exames:</b> ${exames}
      `;
      document.getElementById('novo-status').value = g.status;
      document.getElementById('modal-analise').classList.add('open');
    }

    async function salvarStatus() {
      const novoStatus = document.getElementById('novo-status').value;
      try {
        await apiFetch(`/guias/${guiaSelecionadaId}/status`, {
          method: 'PUT',
          body: JSON.stringify({ status: novoStatus }),
        });
        fecharModal();
        mostrarSucesso('sucesso', 'Status atualizado com sucesso!');
        await carregarGuias();
      } catch (err) {
        mostrarErro('erro', 'Erro ao atualizar status: ' + err.message);
      }
    }

    function fecharModal() {
      document.getElementById('modal-analise').classList.remove('open');
      guiaSelecionadaId = null;
    }

    document.getElementById('filtro-status').addEventListener('change', renderTabela);
    document.getElementById('modal-analise').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) fecharModal();
    });

    apiFetch(`/unidades/${usuario.id}`).then(data => {
      if (data?.[0]) document.getElementById('nome-usuario').textContent = data[0].nome;
    }).catch(() => {});

    carregarGuias();
  </script>
</body>
</html>
