<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paciente – Guias Médicas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">Guias Médicas</span>
    <span style="display:flex; align-items:center; gap:6px;">
      <span class="live-indicator">
        <span class="live-dot"></span>
        Monitorando
      </span>
      <span class="navbar-user" id="nome-usuario"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </span>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>Minhas Guias</h2>
      <!-- Fluxo de status -->
      <div style="display:flex; align-items:center; gap:6px; font-size:.72rem; font-weight:700; color:var(--cinza); text-transform:uppercase; letter-spacing:.4px;">
        <span class="badge badge-pendente">Pendente</span>
        <span style="color:var(--borda);">→</span>
        <span class="badge badge-analise">Em Análise</span>
        <span style="color:var(--borda);">→</span>
        <span class="badge badge-aprovado">Aprovado</span>
        <span style="color:var(--cinza); font-weight:400;">/</span>
        <span class="badge badge-negado">Negado</span>
      </div>
    </div>

    <div id="erro" class="alert alert-error"></div>

    <div class="card" style="padding:0; overflow:hidden;">
      <div id="loading" class="loading">Carregando suas guias...</div>
      <div class="table-wrapper" id="tabela-wrapper" style="display:none; border:none;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Médico</th>
              <th>Unidade</th>
              <th>CID-10</th>
              <th>Exames</th>
              <th>Status</th>
              <th>Data</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <p id="sem-guias" class="text-center text-muted" style="display:none; padding:32px;">
          Você ainda não possui guias solicitadas.
        </p>
      </div>
    </div>
  </div>

  <!-- Modal de detalhes -->
  <div class="modal-overlay" id="modal-detalhes">
    <div class="modal" style="max-width:560px;">
      <div class="modal-title" id="modal-titulo">Detalhes da Guia</div>
      <div id="detalhes-conteudo"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Toast de notificação -->
  <div id="toast" class="toast" style="display:none;"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const usuario = exigirAuth('paciente');
    let guiasAnteriores = {};
    let primeiraVez = true;

    async function carregarGuias(silencioso = false) {
      if (!silencioso) {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('tabela-wrapper').style.display = 'none';
      }

      try {
        const guias = await apiFetch(`/guias/paciente/${usuario.id}`);

        if (!primeiraVez) {
          guias.forEach(g => {
            if (guiasAnteriores[g.id] && guiasAnteriores[g.id] !== g.status) {
              const { text } = statusLabel(g.status);
              mostrarToast(`Guia #${g.id}: status atualizado para ${text}`);
            }
          });
        }

        guias.forEach(g => { guiasAnteriores[g.id] = g.status; });
        primeiraVez = false;
        renderTabela(guias);
      } catch (err) {
        if (!silencioso) mostrarErro('erro', 'Erro ao carregar guias: ' + err.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tabela-wrapper').style.display = 'block';
      }
    }

    function renderTabela(guias) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      if (guias.length === 0) {
        document.getElementById('sem-guias').style.display = 'block';
        return;
      }
      document.getElementById('sem-guias').style.display = 'none';

      guias.forEach(g => {
        const { text, cls } = statusLabel(g.status);
        const data   = new Date(g.criado_em).toLocaleDateString('pt-BR');
        const exames = g.exames?.map(e => e.nome).join(', ') || '—';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--cinza); font-size:.8rem;">#${g.id}</td>
          <td>${g.nome_medico ? 'Dr(a). ' + g.nome_medico : '—'}</td>
          <td>${g.nome_unidade || '—'}</td>
          <td><code>${g.cid_10}</code></td>
          <td style="max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--cinza);" title="${exames}">${exames}</td>
          <td><span class="badge ${cls}">${text}</span></td>
          <td style="color:var(--cinza);">${data}</td>
          <td><button class="btn btn-secondary btn-sm" onclick="abrirDetalhes(${g.id})">Ver</button></td>
        `;
        tbody.appendChild(tr);
      });

      window._guiasCache = guias;
    }

    function abrirDetalhes(id) {
      const g = (window._guiasCache || []).find(x => x.id === id);
      if (!g) return;
      const { text, cls } = statusLabel(g.status);
      const exames = g.exames?.map(e => e.nome).join(', ') || '—';
      document.getElementById('modal-titulo').textContent = `Guia #${g.id}`;
      document.getElementById('detalhes-conteudo').innerHTML = `
        <table style="width:100%; font-size:.88rem;">
          <tr><td style="padding:7px 4px; color:var(--cinza); width:42%; font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Médico</td><td>${g.nome_medico ? 'Dr(a). ' + g.nome_medico : '—'}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Unidade</td><td>${g.nome_unidade || '—'}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Status</td><td><span class="badge ${cls}">${text}</span></td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">CID-10</td><td><code>${g.cid_10}</code></td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Prioridade</td><td>${g.prioridade}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Motivo</td><td>${g.motivo_encaminhamento}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Exames</td><td>${exames}</td></tr>
          <tr><td style="padding:7px 4px; color:var(--cinza); font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; font-weight:700;">Data</td><td>${new Date(g.criado_em).toLocaleString('pt-BR')}</td></tr>
        </table>
      `;
      document.getElementById('modal-detalhes').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('modal-detalhes').classList.remove('open');
    }

    function mostrarToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = '🔔 ' + msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 6000);
    }

    document.getElementById('modal-detalhes').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) fecharModal();
    });

    apiFetch(`/pacientes/${usuario.id}`).then(data => {
      if (data?.[0]) document.getElementById('nome-usuario').textContent = data[0].nome;
    }).catch(() => {});

    carregarGuias(false);
    setInterval(() => carregarGuias(true), 30000);
  </script>
</body>
</html>
