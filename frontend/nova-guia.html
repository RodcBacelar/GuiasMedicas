<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Guia – Médico</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">🏥 Guias Médicas</span>
    <span>
      <a href="dashboard-medico.html" class="btn-logout" style="text-decoration:none;">← Voltar</a>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </span>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>Solicitar Nova Guia Médica</h2>
    </div>

    <div id="erro"    class="alert alert-error"></div>
    <div id="sucesso" class="alert alert-success"></div>

    <form id="form-guia">

      <!-- Paciente e Unidade -->
      <div class="card">
        <div class="card-title">Dados do Encaminhamento</div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Paciente *</label>
            <select id="id_paciente" required>
              <option value="">Carregando...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Unidade / Plano de Saúde *</label>
            <select id="id_unidade" required>
              <option value="">Carregando...</option>
            </select>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>Prioridade (1–5) *</label>
            <select id="prioridade" required>
              <option value="1">1 – Urgente</option>
              <option value="2">2 – Alta</option>
              <option value="3" selected>3 – Normal</option>
              <option value="4">4 – Baixa</option>
              <option value="5">5 – Eletivo</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nº de Consultas *</label>
            <input type="number" id="numero_consultas" min="1" value="1" required>
          </div>
        </div>
        <div class="form-group">
          <label>CID-10 *</label>
          <input type="text" id="cid_10" placeholder="Ex: I10, J45.0" required>
        </div>
      </div>

      <!-- Dados clínicos -->
      <div class="card">
        <div class="card-title">Dados Clínicos</div>
        <div class="form-group">
          <label>Tempo de doença *</label>
          <textarea id="tempo_doenca" placeholder="Ex: 6 meses de hipertensão não controlada" required></textarea>
        </div>
        <div class="form-group">
          <label>Quadro clínico *</label>
          <textarea id="quadro_clinico" placeholder="Descreva os sinais e sintomas" required></textarea>
        </div>
        <div class="form-group">
          <label>Hipótese diagnóstica *</label>
          <textarea id="hipotese_diagnostico" placeholder="Ex: Hipertensão arterial sistêmica" required></textarea>
        </div>
        <div class="form-group">
          <label>Medicação em uso *</label>
          <textarea id="medicacao" placeholder="Ex: Losartana 50mg 1x/dia" required></textarea>
        </div>
        <div class="form-group">
          <label>Tratamento / Evolução *</label>
          <textarea id="tratamento_evolucao" placeholder="Descreva o tratamento realizado e evolução" required></textarea>
        </div>
        <div class="form-group">
          <label>Motivo do encaminhamento *</label>
          <textarea id="motivo_encaminhamento" placeholder="Ex: Avaliar controle pressórico e ajuste terapêutico" required></textarea>
        </div>
      </div>

      <!-- Exames -->
      <div class="card">
        <div class="card-title">Exames Solicitados *</div>
        <p class="text-muted mb-4">Selecione ao menos um exame.</p>
        <div id="exames-grid" class="exames-grid">
          <div class="loading">Carregando exames...</div>
        </div>
        <p id="erro-exames" style="color:var(--vermelho); font-size:.85rem; margin-top:8px; display:none;">
          Selecione ao menos um exame.
        </p>
      </div>

      <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:4px; margin-bottom:32px;">
        <a href="dashboard-medico.html" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary" id="btn-salvar" style="width:auto; padding:9px 32px;">
          Enviar Solicitação
        </button>
      </div>
    </form>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const usuario = exigirAuth('medico');

    // Carrega pacientes, unidades e exames em paralelo
    async function carregarDados() {
      try {
        const [pacientes, unidades, exames] = await Promise.all([
          apiFetch('/pacientes'),
          apiFetch('/unidades'),
          apiFetch('/exames'),
        ]);

        // Pacientes
        const selPaciente = document.getElementById('id_paciente');
        selPaciente.innerHTML = '<option value="">Selecione o paciente</option>' +
          pacientes.map(p => `<option value="${p.id_usuario}">${p.nome}</option>`).join('');

        // Unidades
        const selUnidade = document.getElementById('id_unidade');
        selUnidade.innerHTML = '<option value="">Selecione a unidade</option>' +
          unidades.map(u => `<option value="${u.id_usuario}">${u.nome}</option>`).join('');

        // Exames – checkboxes
        const grid = document.getElementById('exames-grid');
        if (exames.length === 0) {
          grid.innerHTML = '<p class="text-muted">Nenhum exame cadastrado.</p>';
        } else {
          grid.innerHTML = exames.map(e => `
            <label class="exame-item">
              <input type="checkbox" name="exame" value="${e.id}">
              ${e.nome}
            </label>
          `).join('');
        }
      } catch (err) {
        mostrarErro('erro', 'Erro ao carregar dados: ' + err.message);
      }
    }

    document.getElementById('form-guia').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Valida exames
      const exameSelecionados = [...document.querySelectorAll('input[name=exame]:checked')].map(el => Number(el.value));
      if (exameSelecionados.length === 0) {
        document.getElementById('erro-exames').style.display = 'block';
        return;
      }
      document.getElementById('erro-exames').style.display = 'none';

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        await apiFetch('/guias', {
          method: 'POST',
          body: JSON.stringify({
            id_medico:             usuario.id,
            id_paciente:           Number(document.getElementById('id_paciente').value),
            id_unidade:            Number(document.getElementById('id_unidade').value),
            prioridade:            Number(document.getElementById('prioridade').value),
            numero_consultas:      Number(document.getElementById('numero_consultas').value),
            cid_10:                document.getElementById('cid_10').value,
            tempo_doenca:          document.getElementById('tempo_doenca').value,
            quadro_clinico:        document.getElementById('quadro_clinico').value,
            hipotese_diagnostico:  document.getElementById('hipotese_diagnostico').value,
            medicacao:             document.getElementById('medicacao').value,
            tratamento_evolucao:   document.getElementById('tratamento_evolucao').value,
            motivo_encaminhamento: document.getElementById('motivo_encaminhamento').value,
            exames:                exameSelecionados,
          }),
        });
        mostrarSucesso('sucesso', 'Guia enviada com sucesso! Redirecionando...');
        setTimeout(() => window.location.href = 'dashboard-medico.html', 2000);
      } catch (err) {
        mostrarErro('erro', err.message);
        btn.disabled = false;
        btn.textContent = 'Enviar Solicitação';
      }
    });

    carregarDados();
  </script>
</body>
</html>
